# =============================================================================
# cerberOS Umbrella Chart — default values
# =============================================================================
# All component sub-charts are namespaced by their chart name.
# Override in values-dev.yaml or values-prod.yaml as needed.
# Secrets (passwords, tokens, API keys) MUST be overridden at install time:
#   helm install cerberos . -f values-dev.yaml \
#     --set memory-api.vaultMasterKey=<32chars> \
#     --set memory-api.internalVaultApiKey=<key> \
#     --set memory-api.openaiApiKey=<key> \
#     --set io.openaiApiKey=<key> \
#     --set vault-engine.baoToken=<token> \
#     --set vault-engine.tavilyApiKey=<key> \
#     --set vault-engine.openaiApiKey=<key> \
#     --set vault-engine.gmailDemoEmail=<addr> \
#     --set-string vault-engine.gmailDemoAppPassword='<app password>' \
#     --set aegis-agents.anthropicApiKey=<key> \
#     --set postgres.auth.password=<pw>
# =============================================================================

# ── Messaging ────────────────────────────────────────────────────────────────
nats: {}   # All defaults from charts/nats/values.yaml

# ── Data plane ───────────────────────────────────────────────────────────────
postgres:
  auth:
    user: user
    password: changeme
    database: memory_db

openbao:
  postgres:
    user: user
    password: changeme
  devMode: false
  baoToken: ""

# ── Application services ─────────────────────────────────────────────────────
global:
  embedding:
    apiUrl: "http://embedding-api/v1/embeddings"
    model: "microsoft/harrier-oss-v1-270m"
    dimensions: "640"
    promptStyle: "harrier"
    hfToken: ""
  # Cross-chart secrets — rendered into a single Secret (cerberos-shared-secrets)
  # by the umbrella chart and consumed via secretKeyRef in each sub-chart.
  # Override at install time:
  #   --set global.sharedSecrets.INTERNAL_VAULT_API_KEY=<key>
  #   --set global.sharedSecrets.OPENAI_API_KEY=<key>
  #   --set global.sharedSecrets.GOOGLE_CLIENT_ID=<id>
  #   --set global.sharedSecrets.GOOGLE_CLIENT_SECRET=<secret>
  sharedSecrets:
    INTERNAL_VAULT_API_KEY: ""
    OPENAI_API_KEY: ""
    GOOGLE_CLIENT_ID: ""
    GOOGLE_CLIENT_SECRET: ""
    GOOGLE_REDIRECT_URI: "http://localhost:3001/api/admin/google-oauth/callback"

vault-engine:
  baoToken: ""
  tavilyApiKey: ""
  gmailDemoEmail: ""
  gmailDemoAppPassword: ""

memory-api:
  db:
    user: user
    password: changeme
    name: memory_db
  vaultMasterKey: ""
  embedding:
    provider: tei
    apiUrl: "http://embedding-api/v1/embeddings"
    model: "microsoft/harrier-oss-v1-270m"
    dimensions: "640"
    promptStyle: "harrier"

embedding-api: {}

orchestrator: {}

io: {}

aegis-databus: {}

aegis-agents:
  anthropicApiKey: ""

# ── Observability ─────────────────────────────────────────────────────────────
observability:
  enabled: true

# ── Networking (opt-in) ───────────────────────────────────────────────────────
network-policies:
  enabled: false
