{{- /*
cerberos-shared-secrets — values that span multiple sub-charts.

INTERNAL_VAULT_API_KEY is consumed by memory-api (auth) and io (proxy to
memory-api). OPENAI_API_KEY is consumed by memory-api, io, and vault-engine.
GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET / GOOGLE_REDIRECT_URI are consumed
by io (Admin UI OAuth flow) and vault-engine (token refresh).

Sub-charts mount these via secretKeyRef -> name: cerberos-shared-secrets so
there is exactly one source of truth per value (no mirroring across charts).
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: cerberos-shared-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: cerberos
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  INTERNAL_VAULT_API_KEY: {{ (.Values.global.sharedSecrets).INTERNAL_VAULT_API_KEY | default "" | quote }}
  OPENAI_API_KEY: {{ (.Values.global.sharedSecrets).OPENAI_API_KEY | default "" | quote }}
  GOOGLE_CLIENT_ID: {{ (.Values.global.sharedSecrets).GOOGLE_CLIENT_ID | default "" | quote }}
  GOOGLE_CLIENT_SECRET: {{ (.Values.global.sharedSecrets).GOOGLE_CLIENT_SECRET | default "" | quote }}
  GOOGLE_REDIRECT_URI: {{ (.Values.global.sharedSecrets).GOOGLE_REDIRECT_URI | default "http://localhost:3001/api/admin/google-oauth/callback" | quote }}
