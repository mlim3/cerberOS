image:
  repository: ghcr.io/mlim3/cerberos-vault-engine
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 8000

# baoToken is provided at runtime after openbao is unsealed.
# Supply via --set vault-engine.baoToken=<token> or a sealed-secret.
# In dev (openbao.devMode=true) this is the fixed root token "root".
baoToken: ""

# Per-chart secrets rendered into Secret/vault-engine-secrets. The vault
# engine seeds the optional ones (TAVILY_API_KEY, GMAIL_*) into OpenBao on
# startup (idempotent — skips if already present).
tavilyApiKey: ""
gmailDemoEmail: ""
gmailDemoAppPassword: ""

# Cross-chart secrets (OPENAI_API_KEY, GOOGLE_CLIENT_*) live in the umbrella
# Secret. Override only if the umbrella chart was customized to rename it.
sharedSecretName: "cerberos-shared-secrets"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
