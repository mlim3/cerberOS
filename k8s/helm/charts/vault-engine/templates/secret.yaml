apiVersion: v1
kind: Secret
metadata:
  name: vault-engine-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vault-engine.labels" . | nindent 4 }}
type: Opaque
stringData:
  BAO_TOKEN: {{ .Values.baoToken | quote }}
  TAVILY_API_KEY: {{ .Values.tavilyApiKey | quote }}
  GMAIL_DEMO_EMAIL: {{ .Values.gmailDemoEmail | quote }}
  GMAIL_DEMO_APP_PASSWORD: {{ .Values.gmailDemoAppPassword | quote }}
