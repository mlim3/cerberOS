            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      security:
      - ApiKeyAuth: []
      summary: Get a secret
      tags:
      - vault
    post:
      consumes:
      - application/json
      description: Saves a new encrypted secret for a user
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      - description: Secret Payload (key_name, value)
        in: body
        name: request
        required: true
