paths:
  /api/v1/agent/{taskId}/executions:
    get:
      description: Fetches and returns the chronological log of an agent's work for
        a specific taskId
      parameters:
      - description: Task ID
        in: path
        name: taskId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of task executions
          schema:
            items:
              $ref: '#/definitions/github_com_mlim3_cerberOS_memory_internal_storage.AgentLogsSchemaTaskExecution'
            type: array
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      summary: Get task executions
      tags:
      - agents
    post:
      consumes:
      - application/json
      description: Creates a new task execution log for an agent
      parameters:
      - description: Task ID
        in: path
        name: taskId
        required: true
        type: string
      - description: Task Execution Payload
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      summary: Create task execution log
      tags:
      - agents
