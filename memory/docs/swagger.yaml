basePath: /
definitions:
  api.ArchiveFactRequest:
    properties:
      reason:
        type: string
    type: object
  api.ConversationResponse:
    properties:
      conversationId:
        type: string
      createdAt:
        type: string
      lastMessagePreview:
        type: string
      latestTaskId:
        type: string
      latestTaskStatus:
        type: string
      messageCount:
        type: integer
      title:
        type: string
      updatedAt:
        type: string
      userId:
        type: string
    type: object
  api.CreateConversationRequest:
    properties:
      conversationId:
        type: string
      title:
        type: string
      userId:
        type: string
    type: object
  api.CreateMessageRequest:
    properties:
      content:
        type: string
      idempotencyKey:
        type: string
      role:
        type: string
      tokenCount:
        type: integer
      userId:
        type: string
    type: object
  api.CreateScheduledJobRequest:
    properties:
      intervalSeconds:
        type: integer
      jobType:
        type: string
      name:
        type: string
      nextRunAt:
        type: string
      payload:
        type: object
      scheduleKind:
        type: string
      status:
        type: string
      targetKind:
        type: string
      targetService:
        type: string
    type: object
  api.CreateSystemEventRequest:
    properties:
      message:
        type: string
      metadata:
        additionalProperties: {}
        type: object
      serviceName:
        type: string
      severity:
        type: string
      traceId:
        type: string
    type: object
  api.CreateTaskRequest:
    properties:
      conversationId:
        type: string
      inputSummary:
        type: string
      orchestratorTaskRef:
        type: string
      status:
        type: string
      taskId:
        type: string
      title:
        type: string
      traceId:
        type: string
      userId:
        type: string
    type: object
  api.MessageResponse:
    properties:
      content:
        type: string
      conversationId:
        type: string
      createdAt:
        type: string
      messageId:
        type: string
      role:
        type: string
      tokenCount:
        type: integer
      userId:
        type: string
    type: object
  api.QueryPersonalInfoRequest:
    properties:
      query:
        type: string
      topK:
        type: integer
    type: object
  api.SavePersonalInfoRequest:
    properties:
      content:
        type: string
      extractFacts:
        type: boolean
      sourceId:
        type: string
      sourceType:
        type: string
    type: object
  api.SessionHistoryResponse:
    properties:
      conversationId:
        type: string
      maxTurns:
        type: integer
      tokenBudget:
        type: integer
      totalTokens:
        type: integer
      truncated:
        type: boolean
      turns:
        items:
          $ref: '#/definitions/api.SessionHistoryTurn'
        type: array
    type: object
  api.SessionHistoryTurn:
    properties:
      content:
        type: string
      createdAt:
        type: string
      messageId:
        type: string
      role:
        type: string
      tokenCount:
        type: integer
    type: object
  api.SupersedeFactRequest:
    properties:
      category:
        type: string
      confidence:
        type: number
      factKey:
        type: string
      factValue: {}
    type: object
  api.SystemEventResponse:
    properties:
      createdAt:
        type: string
      eventId:
        type: string
      message:
        type: string
      metadata:
        additionalProperties: {}
        type: object
      serviceName:
        type: string
      severity:
        type: string
      traceId:
        type: string
    type: object
  api.TaskResponse:
    properties:
      completedAt:
        type: string
      conversationId:
        type: string
      createdAt:
        type: string
      inputSummary:
        type: string
      orchestratorTaskRef:
        type: string
      status:
        type: string
      taskId:
        type: string
      traceId:
        type: string
      updatedAt:
        type: string
      userId:
        type: string
    type: object
  api.UpdateFactRequest:
    properties:
      category:
        type: string
      confidence:
        type: number
      factKey:
        type: string
      factValue: {}
      version:
        type: integer
    type: object
  api.WriteOrchestratorRecordRequest:
    properties:
      data_type:
        type: string
      orchestrator_task_ref:
        type: string
      payload:
        type: object
      plan_id:
        type: string
      subtask_id:
        type: string
      task_id:
        type: string
      timestamp:
        type: string
      trace_id:
        type: string
      ttl_seconds:
        type: integer
    type: object
info:
  contact: {}
  description: REST API for CerberOS memory, chat, personal info, system event, vault,
    and agent execution services.
  title: Memory Service API
  version: v1
paths:
  /api/v1/agent/{taskId}/executions:
    get:
      description: Fetches and returns the chronological log of an agent's work for
        a specific taskId
      parameters:
      - description: Task ID
        in: path
        name: taskId
        required: true
        type: string
      - description: 'Limit number of executions (default: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get task executions
      tags:
      - agents
    post:
      consumes:
      - application/json
      description: Creates a new task execution log for an agent
      parameters:
      - description: Task ID
        in: path
        name: taskId
        required: true
        type: string
      - description: Task Execution Payload
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      summary: Create task execution log
      tags:
      - agents
  /api/v1/agents/tasks/{taskId}/executions:
    get:
      description: Fetches and returns the chronological log of an agent's work for
        a specific taskId
      parameters:
      - description: Task ID
        in: path
        name: taskId
        required: true
        type: string
      - description: 'Limit number of executions (default: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get task executions
      tags:
      - agents
    post:
      consumes:
      - application/json
      description: Creates a new task execution log for an agent
      parameters:
      - description: Task ID
        in: path
        name: taskId
        required: true
        type: string
      - description: Task Execution Payload
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      summary: Create task execution log
      tags:
      - agents
  /api/v1/chat/{conversationId}/history:
    get:
      description: Returns recent turns in chronological order, trimmed to a token
        budget. Intended for Orchestrator/Agents to inject session context into LLM
        prompts.
      parameters:
      - description: Conversation ID
        in: path
        name: conversationId
        required: true
        type: string
      - description: User ID (ownership check)
        in: query
        name: userId
        required: true
        type: string
      - description: Hard cap on the number of recent turns to consider (default 40,
          max 500)
        in: query
        name: max_turns
        type: integer
      - description: Drop oldest turns until sum(tokenCount) <= budget. 0 disables
          trimming. Default 4000.
        in: query
        name: token_budget
        type: integer
      - description: Comma-separated roles to include. Default 'user,assistant'.
        in: query
        name: include_roles
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SessionHistoryResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get conversation session history
      tags:
      - chat
  /api/v1/chat/{conversationId}/messages:
    get:
      description: Retrieves a list of messages for a specific chat session
      parameters:
      - description: Conversation ID
        in: path
        name: conversationId
        required: true
        type: string
      - description: User ID
        in: query
        name: userId
        required: true
        type: string
      - description: 'Limit number of messages (default: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/api.MessageResponse'
              type: array
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: List chat messages
      tags:
      - chat
    post:
      consumes:
      - application/json
      description: Creates a new message in a chat session
      parameters:
      - description: Conversation ID
        in: path
        name: conversationId
        required: true
        type: string
      - description: Message Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.CreateMessageRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.MessageResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Create a new chat message
      tags:
      - chat
  /api/v1/conversations:
    get:
      description: Retrieves conversation summaries for a specific user
      parameters:
      - description: User ID
        in: query
        name: userId
        required: true
        type: string
      - description: 'Limit number of conversations (default: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/api.ConversationResponse'
              type: array
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: List conversations
      tags:
      - chat
    post:
      consumes:
      - application/json
      description: Creates a new conversation for a specific user
      parameters:
      - description: Conversation Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.CreateConversationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Already Exists
          schema:
            $ref: '#/definitions/api.ConversationResponse'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.ConversationResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Create conversation
      tags:
      - chat
  /api/v1/healthz:
    get:
      description: Returns service health and database connectivity status
      produces:
      - application/json
      responses:
        "200":
          description: Healthy
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Degraded
          schema:
            additionalProperties: true
            type: object
      summary: Health check
      tags:
      - system
  /api/v1/orchestrator/records:
    get:
      description: Retrieves orchestrator records by data_type and task/orchestrator
        filters
      parameters:
      - description: Data type
        in: query
        name: data_type
        required: true
        type: string
      - description: Task ID
        in: query
        name: task_id
        type: string
      - description: Orchestrator task ref
        in: query
        name: orchestrator_task_ref
        type: string
      - description: Inclusive lower bound timestamp
        in: query
        name: from_timestamp
        type: string
      - description: Inclusive upper bound timestamp
        in: query
        name: to_timestamp
        type: string
      - description: Use not_terminal to exclude terminal task states
        in: query
        name: state_filter
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Query orchestrator records
      tags:
      - orchestrator
    post:
      consumes:
      - application/json
      description: Creates or upserts one orchestrator record depending on data_type
        semantics
      parameters:
      - description: Orchestrator record payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.WriteOrchestratorRecordRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Write orchestrator record
      tags:
      - orchestrator
  /api/v1/orchestrator/records/latest:
    get:
      description: Retrieves the latest orchestrator record for a task and data_type
      parameters:
      - description: Task ID
        in: query
        name: task_id
        required: true
        type: string
      - description: Data type
        in: query
        name: data_type
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Read latest orchestrator record
      tags:
      - orchestrator
  /api/v1/personal_info/{userId}/all:
    get:
      description: Retrieves all stored facts and chunks for a user
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get all personal information
      tags:
      - personal_info
  /api/v1/personal_info/{userId}/facts/{factId}:
    delete:
      description: Deletes a fact for a user
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      - description: Fact ID
        in: path
        name: factId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Delete a fact
      tags:
      - personal_info
    put:
      consumes:
      - application/json
      description: Updates a fact for a user with optimistic concurrency control
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      - description: Fact ID
        in: path
        name: factId
        required: true
        type: string
      - description: Update Fact Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.UpdateFactRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Update a fact
      tags:
      - personal_info
  /api/v1/personal_info/{userId}/facts/{factId}/archive:
    post:
      consumes:
      - application/json
      description: Archives an active fact for a user with an explicit archive reason
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      - description: Fact ID
        in: path
        name: factId
        required: true
        type: string
      - description: Archive Fact Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.ArchiveFactRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Archive a fact
      tags:
      - personal_info
  /api/v1/personal_info/{userId}/facts/{factId}/supersede:
    post:
      consumes:
      - application/json
      description: Creates a replacement fact and archives the previous active fact
        as superseded
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      - description: Fact ID
        in: path
        name: factId
        required: true
        type: string
      - description: Supersede Fact Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.SupersedeFactRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Supersede a fact
      tags:
      - personal_info
  /api/v1/personal_info/{userId}/query:
    post:
      consumes:
      - application/json
      description: Searches for relevant personal information and facts
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      - description: Query Request Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.QueryPersonalInfoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Query personal information
      tags:
      - personal_info
  /api/v1/personal_info/{userId}/save:
    post:
      consumes:
      - application/json
      description: Extracts and saves personal information from text
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      - description: Save Request Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.SavePersonalInfoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Save personal information
      tags:
      - personal_info
  /api/v1/scheduled_jobs:
    post:
      consumes:
      - application/json
      description: Creates a scheduled job for internal maintenance or external dispatch
      parameters:
      - description: Scheduled Job Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.CreateScheduledJobRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Create scheduled job
      tags:
      - scheduled_jobs
  /api/v1/scheduled_jobs/{jobId}/runs:
    get:
      description: Retrieves run history for a scheduled job
      parameters:
      - description: Job ID
        in: path
        name: jobId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: List scheduled job runs
      tags:
      - scheduled_jobs
  /api/v1/scheduled_jobs/run_due:
    post:
      consumes:
      - application/json
      description: Executes all active scheduled jobs whose next run time is due and
        records run history
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Run due scheduled jobs
      tags:
      - scheduled_jobs
  /api/v1/system/events:
    get:
      description: Retrieves a list of system event logs
      parameters:
      - description: 'Limit number of events (default: 100)'
        in: query
        name: limit
        type: integer
      - description: Filter by service name
        in: query
        name: serviceName
        type: string
      - description: Filter by severity
        in: query
        name: severity
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/api.SystemEventResponse'
              type: array
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: List system events
      tags:
      - system_events
    post:
      consumes:
      - application/json
