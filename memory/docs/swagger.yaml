  /api/v1/vault/{userId}/secrets:
    get:
      description: Retrieves and decrypts a secret for a user
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      - description: Key Name
        in: query
        name: key_name
        required: true
