apiVersion: v1
kind: Service
metadata:
  name: {{ include "embedding-api.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "embedding-api.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "embedding-api.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
