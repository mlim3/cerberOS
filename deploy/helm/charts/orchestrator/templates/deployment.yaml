apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orchestrator.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestrator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "orchestrator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "orchestrator.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-nats
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z nats 4222; do
                echo "Waiting for nats..."; sleep 3;
              done
      containers:
        - name: orchestrator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: NATS_URL
              value: {{ .Values.natsUrl | quote }}
            - name: NATS_CREDS_PATH
              value: ""
            - name: VAULT_ADDR
              value: {{ .Values.vaultAddr | quote }}
            - name: MEMORY_ENDPOINT
              value: {{ .Values.memoryEndpoint | quote }}
            - name: IO_API_BASE
              value: {{ .Values.ioApiBase | quote }}
            - name: DECOMPOSITION_TIMEOUT_SECONDS
              value: {{ .Values.decompositionTimeoutSeconds | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.logFormat | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlpEndpoint | quote }}
            - name: LOKI_URL
              value: {{ .Values.observability.lokiUrl | quote }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
