image:
  repository: ghcr.io/mlim3/cerberos-orchestrator
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 8080
  # NodePort for kind extraPortMappings (30080 → host 8080)
  nodePort: 30080

natsUrl: "nats://nats:4222"
vaultAddr: "http://openbao:8200"
memoryEndpoint: "http://memory-api:8081"
ioApiBase: "http://io:3001"

decompositionTimeoutSeconds: "120"
logLevel: "info"
logFormat: "json"

observability:
  otlpEndpoint: "tempo:4317"
  lokiUrl: "http://loki:3100"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# When secretName is set, CRON_WAKE_SECRET is mounted into the orchestrator Deployment
# and POST /v1/cron/wake becomes active (still returns 404 if secret is absent at runtime).
cronWake:
  secretName: ""
  secretKey: secret

# Optional Kubernetes CronJobs that POST to /v1/cron/wake (Planner maintenance tasks).
systemCronWake:
  enabled: false
  curlImage: curlimages/curl:8.11.1
  jobs: []
  # Example (enable after creating a Secret with matching secretKey):
  # jobs:
  #   - name: maint-planner
  #     schedule: "*/30 * * * *"
  #     suspend: false
  #     jobName: planner-maintenance
  #     rawInput: |-
  #       Review scheduling health; schedule fact decay scans if warranted.
  #     systemPrompt: ""
