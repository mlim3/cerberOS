apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nats.labels" . | nindent 4 }}
data:
  nats.conf: |
    port: 4222
    http_port: 8222
    server_name: $POD_NAME

    jetstream {
      store_dir: /data
      max_mem: 256MB
      max_file: 1GB
    }

    lame_duck_duration: 30s
    lame_duck_grace_period: 10s
