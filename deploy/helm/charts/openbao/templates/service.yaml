apiVersion: v1
kind: Service
metadata:
  name: openbao
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openbao.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "openbao.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
