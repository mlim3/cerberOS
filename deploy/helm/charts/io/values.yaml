image:
  repository: ghcr.io/mlim3/cerberos-io
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

# How long the Deployment controller waits for a new revision to become available
# (must exceed worst-case image pull + startupProbe budget on small kind nodes).
progressDeadlineSeconds: 900

# HTTP listen address inside the container (required for K8s probes to reach the pod IP).
listenHost: "0.0.0.0"

service:
  port: 3001
  # NodePort for kind extraPortMappings (30001 → host 3001)
  nodePort: 30001

natsUrl: "nats://nats:4222"
memoryApiBase: "http://memory-api:8081"
# Same secret memory-api expects as INTERNAL_VAULT_API_KEY (vault/orchestrator BFF routes).
# Required for POST/GET /api/user-crons and other Memory proxies in io/api.
internalVaultApiKey: ""
logLevel: "info"
demoMode: "false"
sttProvider: "disabled"

observability:
  otlpEndpoint: "http://tempo:4318"
  serviceName: "io-api"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 768Mi

# ---------------------------------------------------------------------------
# Extension hook: Ingress (off by default)
# Enable in values-prod.yaml with a real host and TLS secret.
#
# ingress:
#   enabled: true
#   className: nginx
#   host: cerberos.example.com
#   tls:
#     enabled: true
#     secretName: cerberos-tls
#   annotations:
#     cert-manager.io/cluster-issuer: letsencrypt-prod
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  host: ""
  tls:
    enabled: false
    secretName: ""
  annotations: {}
