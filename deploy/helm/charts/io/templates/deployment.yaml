apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "io.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "io.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "io.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "io.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-nats
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z nats 4222; do
                echo "Waiting for nats..."; sleep 3;
              done
      containers:
        - name: io
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: DEMO_MODE
              value: {{ .Values.demoMode | quote }}
            - name: NATS_URL
              value: {{ .Values.natsUrl | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: STT_PROVIDER
              value: {{ .Values.sttProvider | quote }}
            - name: MEMORY_API_BASE
              value: {{ .Values.memoryApiBase | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlpEndpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.observability.serviceName | quote }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
