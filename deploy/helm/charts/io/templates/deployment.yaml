apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "io.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "io.labels" . | nindent 4 }}
spec:
  progressDeadlineSeconds: {{ .Values.progressDeadlineSeconds }}
  replicas: {{ .Values.replicaCount }}
  # Avoid running two Bun pods on small kind nodes while still allowing patch-safe upgrades
  # from existing RollingUpdate Deployments.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "io.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "io.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-nats
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z nats 4222; do
                echo "Waiting for nats..."; sleep 3;
              done
      containers:
        - name: io
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: DEMO_MODE
              value: {{ .Values.demoMode | quote }}
            - name: NATS_URL
              value: {{ .Values.natsUrl | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: STT_PROVIDER
              value: {{ .Values.sttProvider | quote }}
            - name: MEMORY_API_BASE
              value: {{ .Values.memoryApiBase | quote }}
            {{- if .Values.internalVaultApiKey }}
            - name: INTERNAL_VAULT_API_KEY
              value: {{ .Values.internalVaultApiKey | quote }}
            - name: MEMORY_API_KEY
              value: {{ .Values.internalVaultApiKey | quote }}
            {{- end }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlpEndpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.observability.serviceName | quote }}
            - name: IO_LISTEN_HOST
              value: {{ .Values.listenHost | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          # TCP probes — kubelet speaks to pod IP; avoids HTTP middleware / OTLP edge cases during probes.
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
