apiVersion: v1
kind: Service
metadata:
  name: memory-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "memory-api.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "memory-api.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
