apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "memory-api.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "memory-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "memory-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "memory-api.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.db.host }} {{ .Values.db.port }}; do
                echo "Waiting for postgres..."; sleep 3;
              done
      containers:
        - name: memory-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: DB_HOST
              value: {{ .Values.db.host | quote }}
            - name: DB_PORT
              value: {{ .Values.db.port | quote }}
            - name: DB_USER
              value: {{ .Values.db.user | quote }}
            - name: DB_NAME
              value: {{ .Values.db.name | quote }}
            - name: PORT
              value: "8081"
            - name: NATS_URL
              value: {{ .Values.natsUrl | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlpEndpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.observability.serviceName | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: memory-api-secrets
                  key: DB_PASSWORD
            - name: VAULT_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: memory-api-secrets
                  key: VAULT_MASTER_KEY
            - name: INTERNAL_VAULT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: memory-api-secrets
                  key: INTERNAL_VAULT_API_KEY
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
