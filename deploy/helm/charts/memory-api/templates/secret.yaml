apiVersion: v1
kind: Secret
metadata:
  name: memory-api-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "memory-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_PASSWORD: {{ .Values.db.password | quote }}
  VAULT_MASTER_KEY: {{ .Values.vaultMasterKey | quote }}
  INTERNAL_VAULT_API_KEY: {{ .Values.internalVaultApiKey | quote }}
