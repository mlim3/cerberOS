apiVersion: v2
name: observability
description: cerberOS Observability stack — Prometheus, Grafana, Loki, Tempo, Promtail (DaemonSet)
type: application
version: 0.1.0

dependencies:
  - name: prometheus
    version: "25.20.1"
    repository: https://prometheus-community.github.io/helm-charts
    alias: prometheus

  - name: grafana
    version: "7.3.7"
    repository: https://grafana.github.io/helm-charts
    alias: grafana

  - name: loki
    version: "6.6.2"
    repository: https://grafana.github.io/helm-charts
    alias: loki

  - name: tempo
    version: "1.7.2"
    repository: https://grafana.github.io/helm-charts
    alias: tempo
