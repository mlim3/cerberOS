{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "observability.labels" . | nindent 4 }}
data:
  cerberos-agent-outcomes.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Running counts of orchestrator task outcomes sourced from the dispatcher's atomic counters.",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "orchestrator_tasks_received_total", "legendFormat": "received", "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "orchestrator_tasks_completed_total", "legendFormat": "completed", "refId": "B" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "orchestrator_tasks_failed_total", "legendFormat": "failed", "refId": "C" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "orchestrator_policy_violations_total", "legendFormat": "policy_violations", "refId": "D" }
          ],
          "title": "Task outcomes",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "In-flight task count in the dispatcher.",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "orchestrator_queue_depth", "legendFormat": "queue_depth", "refId": "A" }
          ],
          "title": "Queue depth",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Per-skill invocation outcomes from the agents component.",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "id": 3,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "sum by (outcome) (rate(aegis_agents_skill_invocations_total[5m]))", "legendFormat": "{{outcome}}", "refId": "A" }
          ],
          "title": "Skill invocation rate by outcome",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "LLM response cache hit/miss ratio from agent-process.",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "id": 4,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "rate(aegis_agents_llm_cache_hits_total[5m])", "legendFormat": "hits/s", "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "rate(aegis_agents_llm_cache_misses_total[5m])", "legendFormat": "misses/s", "refId": "B" }
          ],
          "title": "LLM cache hit/miss rate",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "tags": ["cerberos", "agents", "outcomes"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "CerberOS — Agent outcomes",
      "uid": "cerberos-agent-outcomes",
      "version": 1,
      "weekStart": ""
    }

  cerberos-logs.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 18, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "editorMode": "code",
              "expr": "{namespace=\"cerberos\", app_kubernetes_io_part_of=\"cerberos\"}",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "cerberOS — all pod logs",
          "type": "logs"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 38,
      "tags": ["cerberos", "loki"],
      "templating": { "list": [] },
      "time": { "from": "now-15m", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "CerberOS — container logs",
      "uid": "cerberos-logs",
      "version": 1,
      "weekStart": ""
    }
{{- end }}
