# ---------------------------------------------------------------------------
# cerberOS Observability sub-chart values
# ---------------------------------------------------------------------------
# Each upstream chart is aliased and configured minimally for dev.
# Production tuning: increase retention, add persistent storage, set auth.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Extension hook: disable this entire sub-chart and bring your own stack
# ---------------------------------------------------------------------------
enabled: true

prometheus:
  server:
    fullnameOverride: prometheus
    service:
      servicePort: 9090
    persistentVolume:
      enabled: false
    extraFlags:
      - web.enable-remote-write-receiver
    extraConfigmapMounts:
      - name: alert-rules
        mountPath: /etc/prometheus/rules
        configMap: prometheus-alert-rules
        readOnly: true
  alertmanager:
    enabled: false
  kube-state-metrics:
    enabled: false
  prometheus-node-exporter:
    enabled: false
  prometheus-pushgateway:
    enabled: false
  extraScrapeConfigs: |
    - job_name: aegis-databus
      static_configs:
        - targets: ["aegis-databus:9091"]
    - job_name: orchestrator
      metrics_path: /metrics
      static_configs:
        - targets: ["orchestrator:8080"]
    - job_name: memory-api
      metrics_path: /internal/metrics
      static_configs:
        - targets: ["memory-api:8081"]
    - job_name: aegis-agents
      static_configs:
        - targets: ["aegis-agents:9090"]

grafana:
  fullnameOverride: grafana
  adminPassword: admin
  service:
    type: NodePort
    nodePort: 30300
  grafana.ini:
    users:
      allow_sign_up: false
    plugins:
      preinstall:
        - grafana-piechart-panel
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus:9090
          isDefault: true
        - name: Loki
          type: loki
          url: http://cerberos-loki:3100
        - name: Tempo
          type: tempo
          url: http://tempo:3100
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: cerberos
          orgId: 1
          folder: cerberOS
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/cerberos
  dashboardsConfigMaps:
    cerberos: grafana-dashboards

loki:
  deploymentMode: SingleBinary
  loki:
    # Satisfies Loki's schema_config validation without a full schemaConfig block.
    # Set to false and provide schemaConfig in values-prod.yaml for production.
    useTestSchema: true
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    auth_enabled: false
  singleBinary:
    replicas: 1
  # Explicitly zero scalable targets so the SingleBinary validation passes
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  # K8s-native log collection via Promtail DaemonSet (replaces docker.sock approach)
  promtail:
    enabled: true

tempo:
  fullnameOverride: tempo
  tempo:
    metricsGenerator:
      enabled: true
      remoteWriteUrl: http://prometheus:9090/api/v1/write
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  service:
    type: ClusterIP
