apiVersion: v1
kind: Service
metadata:
  name: aegis-agents
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aegis-agents.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "aegis-agents.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
