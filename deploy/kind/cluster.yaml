kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
# 1 control-plane + 2 workers so pods actually spread across nodes,
# demonstrating distributed deployment as required.
nodes:
  - role: control-plane
    extraPortMappings:
      # io API — accessible from the host at http://localhost:3001
      - containerPort: 30001
        hostPort: 3001
        protocol: TCP
      # orchestrator health
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      # NATS client
      - containerPort: 30222
        hostPort: 4222
        protocol: TCP
      # Grafana
      - containerPort: 30300
        hostPort: 3000
        protocol: TCP
  - role: worker
  - role: worker
