name: Helm Lint & Validate

on:
  pull_request:
    branches: ["main"]
    paths:
      - "k8s/helm/**"
      - ".github/workflows/helm-lint.yaml"
  push:
    branches: ["main"]
    paths:
      - "k8s/helm/**"

jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Add required Helm repos
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      - name: Resolve component chart dependencies
        run: |
          # Any component chart that declares `dependencies:` needs its sub-charts
          # fetched before `helm lint --strict` will pass (strict mode treats
          # missing dependencies as errors).
          for chart in k8s/helm/charts/*/; do
            if grep -q "^dependencies:" "$chart/Chart.yaml" 2>/dev/null; then
              echo "==> Resolving deps for $chart"
              helm dependency update "$chart"
            fi
          done

      - name: Lint all component charts
        run: |
          for chart in k8s/helm/charts/*/; do
            echo "==> Linting $chart"
            helm lint "$chart" --strict
          done

      - name: Update umbrella dependencies
        run: helm dependency update k8s/helm/cerberos

      - name: Lint umbrella chart
        run: helm lint k8s/helm/cerberos --strict -f k8s/helm/cerberos/values-dev.yaml

      - name: Template umbrella chart (dry-run)
        run: |
          helm template cerberos k8s/helm/cerberos \
            -f k8s/helm/cerberos/values-dev.yaml \
            --namespace cerberos \
            > /dev/null
          echo "Template rendered successfully."
