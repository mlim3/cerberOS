# default_skills.yaml — built-in skill tree for the Aegis OS Agents Component.
#
# This file is the single authoritative definition of all built-in skills.
# It is embedded in both cmd/aegis-agents (M4 registration) and cmd/agent-process
# (tool dispatch) and used automatically when AEGIS_SKILLS_CONFIG_PATH is unset.
#
# To extend the skill set: add a new command here, add its Execute function to
# cmd/agent-process, and register the implementation name in builtin_registry.go.
#
# Schema per command:
#   name:                    snake_case identifier (max 64 chars)
#   label:                   human-readable name for monitoring/audit (never sent to LLM)
#   description:             what the tool does and when NOT to use it (max 300 chars)
#   implementation:          name in the agent-process builtin_registry
#   required_credential_types: empty = local-only; non-empty = vault execution required
#   timeout_seconds:         0 = default 30s; hard max 300s
#   parameters:
#     - name:        parameter name (key in the JSON input schema)
#       type:        string | integer | object | array | boolean
#       required:    true | false
#       description: parameter description (required for Tool Contract compliance)
#       enum:        [value1, value2]  # optional
#       additional_properties_type: string  # optional; used for type: object params
#                                           # with uniform-value maps (e.g. variables map)

domains:
  - name: web
    commands:
      - name: web_fetch
        label: 'Web Fetch'
        description: 'Fetch the content of a URL via HTTP GET or POST. Use for web pages, REST APIs, or any HTTP resource that does not require authentication. Do NOT use for operations requiring authentication — those require vault execution.'
        implementation: web_fetch
        required_credential_types: []
        timeout_seconds: 30
        parameters:
          - name: url
            type: string
            required: true
            description: 'The fully-qualified URL to fetch (must include scheme: https:// or http://).'
          - name: method
            type: string
            required: false
            description: 'HTTP method. Allowed: GET, POST. Defaults to GET when omitted.'
            enum: [GET, POST]

      - name: vault_web_fetch
        label: 'Vault Web Fetch'
        description: 'Fetch a URL using a stored API credential managed by the Vault. Use for authenticated HTTP requests (APIs requiring an API key). Do NOT use for public URLs — use web_fetch instead. Do NOT include credential values in any parameter.'
        implementation: vault_web_fetch
        required_credential_types: [web_api_key]
        timeout_seconds: 40
        parameters:
          - name: url
            type: string
            required: true
            description: 'The fully-qualified URL to fetch (must include scheme: https:// or http://).'
          - name: method
            type: string
            required: false
            description: 'HTTP method. Allowed: GET, POST. Defaults to GET when omitted.'
            enum: [GET, POST]

      - name: web_search
        label: 'Web Search'
        description: 'Search the web using AI-powered search and get ranked results with title, URL, and content snippet. Do NOT use for fetching a specific known URL — use web_fetch for that. Do NOT use for authenticated APIs — those require vault execution.'
        implementation: web_search
        required_credential_types: [search_api_key]
        timeout_seconds: 40
        parameters:
          - name: query
            type: string
            required: true
            description: 'Plain-language search query. Be specific and descriptive for best results. Do not use boolean operators or special syntax.'
          - name: max_results
            type: integer
            required: false
            description: 'Maximum number of results to return (1–20). Defaults to 5. Use a higher value only when breadth matters more than speed.'
          - name: include_domains
            type: array
            required: false
            description: 'Restrict results to these domains (e.g. ["docs.python.org", "github.com"]). Omit to search the open web.'
          - name: exclude_domains
            type: array
            required: false
            description: 'Exclude results from these domains. Omit to apply no domain exclusions.'

      - name: web_extract
        label: 'Web Content Extraction'
        description: 'Fetch a public URL and return its content as clean text or Markdown, stripping HTML boilerplate. Do NOT use for binary files or URLs requiring authentication. Do NOT use to search the web — use web_search for that.'
        implementation: web_extract
        required_credential_types: []
        timeout_seconds: 60
        parameters:
          - name: url
            type: string
            required: true
            description: 'The full URL of the page to extract content from (must be http:// or https://). Must be publicly accessible.'
          - name: format
            type: string
            required: false
            description: "Output format: 'text' (default) strips HTML and returns plain text; 'markdown' preserves headings and links; 'links' returns only the list of hyperlinks found on the page."
            enum: [text, markdown, links]

  - name: data
    commands:
      - name: data_transform
        label: 'Data Transform'
        description: 'Transform or inspect a local JSON value. Use to extract fields, list object keys, or measure array length. Do NOT use when the data must be fetched from an authenticated source — use vault_data_read for that.'
        implementation: data_transform
        required_credential_types: []
        timeout_seconds: 10
        parameters:
          - name: data
            type: string
            required: true
            description: 'The JSON value to operate on, encoded as a string.'
          - name: path
            type: string
            required: false
            description: 'Dot-notation path to navigate before applying the operation. Examples: ".name", ".users.0.email". Omit or pass "." to operate on the root value.'
          - name: operation
            type: string
            required: true
            description: 'What to do at the resolved path. "extract": return the JSON value. "keys": return sorted keys of a JSON object. "length": return array length, object key count, or string byte length.'
            enum: [extract, keys, length]

      - name: vault_data_read
        label: 'Vault Data Read'
        description: 'Read records from an authenticated data store via the Vault. Provide a collection name and query expression. Do NOT use for unauthenticated HTTP sources — use web_fetch. Do NOT include credential values in any parameter.'
        implementation: vault_data_read
        required_credential_types: [data_read_key]
        timeout_seconds: 35
        parameters:
          - name: collection
            type: string
            required: true
            description: 'Name of the table, index, or collection to read from (e.g. "users", "orders").'
          - name: query
            type: string
            required: true
            description: 'Query expression or record ID. Interpretation is data-store specific (e.g. a SQL WHERE clause, a document ID, or a filter string).'

      - name: vault_data_write
        label: 'Vault Data Write'
        description: 'Write or upsert a JSON record into an authenticated data store via the Vault. Provide a collection name and a JSON-encoded record object. Do NOT use for reading — use vault_data_read. Do NOT include credential values in any parameter.'
        implementation: vault_data_write
        required_credential_types: [data_write_key]
        timeout_seconds: 35
        parameters:
          - name: collection
            type: string
            required: true
            description: 'Name of the table, index, or collection to write to (e.g. "users", "events").'
          - name: record
            type: string
            required: true
            description: 'The record to write, encoded as a JSON object string. Must be a valid JSON object.'

  - name: comms
    commands:
      - name: comms_format
        label: 'Comms Format'
        description: 'Render a message template by replacing {{variable}} placeholders with supplied values. Use to compose notification or report bodies before sending. Do NOT use this tool to deliver the message — call vault_comms_send for sending.'
        implementation: comms_format
        required_credential_types: []
        timeout_seconds: 5
        parameters:
          - name: template
            type: string
            required: true
            description: 'Message template string. Use {{variable_name}} syntax for placeholders (e.g. "Hello, {{name}}!").'
          - name: variables
            type: object
            required: false
            description: 'Map of placeholder names to string substitution values. Each key corresponds to a {{key}} in the template.'
            additional_properties_type: string

      - name: vault_comms_send
        label: 'Vault Comms Send'
        description: 'Send a message to a PRE-REGISTERED named channel (Slack, webhook) via the Vault. "channel" is a logical id configured in the Vault (e.g. "ops-alerts"), NOT an email address. To email a specific address use gmail_send. Do NOT include credentials.'
        implementation: vault_comms_send
        required_credential_types: [comms_api_key]
        timeout_seconds: 35
        parameters:
          - name: channel
            type: string
            required: true
            description: 'Logical channel identifier configured in the Vault (e.g. "ops-alerts", "customer-support"). Do NOT pass raw URLs, API keys, webhook URLs, or email addresses — for raw email addresses use gmail_send.'
          - name: message
            type: string
            required: true
            description: 'The fully-rendered message body to send. Use comms_format to render templates before calling this tool.'
          - name: subject
            type: string
            required: false
            description: 'Subject line for channels that support it (e.g. email). Omit for channels that do not use subjects (e.g. Slack).'

      # FP-Stefan: Gmail send via SMTP + App Password (no OAuth). Manager
      # configures one shared demo Gmail account in the Admin UI; the credential
      # is stored in OpenBao under `gmail_app_password` as a JSON
      # {email, app_password} blob. Lives in the `comms` domain so the planner
      # routes "email X to <address>" tasks here naturally.
      - name: gmail_send
        label: 'Gmail Send'
        description: 'Send a plain-text email via SMTP through the manager-configured Gmail account. Use whenever the user provides a raw email address (e.g. alice@example.com). Prefer this over vault_comms_send for direct-to-recipient email. Do NOT include the app password — it lives in the Vault.'
        implementation: vault_gmail_send
        required_credential_types: [gmail_app_password]
        timeout_seconds: 40
        parameters:
          - name: to
            type: string
            required: true
            description: 'Recipient email address (one address only).'
          - name: subject
            type: string
            required: true
            description: 'Subject line. Will be sanitized of newline characters.'
          - name: body
            type: string
            required: true
            description: 'Plain-text body content (UTF-8).'

      - name: calendar_create_event
        label: 'Calendar Invite (Gmail)'
        description: "Create a calendar event by sending a Gmail invite (iCalendar attachment). Recipient gets a one-click 'Add to Calendar' button in Gmail. If 'to' is omitted, the invite goes to the configured demo account. Do NOT use for non-event emails — use gmail_send."
        implementation: vault_gmail_calendar_invite
        required_credential_types: [gmail_app_password]
        timeout_seconds: 40
        parameters:
          - name: title
            type: string
            required: true
            description: 'Event title / summary line.'
          - name: start
            type: string
            required: true
            description: "ISO 8601 start datetime (e.g. '2026-06-01T10:00:00-07:00' or '2026-06-01T17:00:00Z')."
          - name: end
            type: string
            required: true
            description: "ISO 8601 end datetime, in the same format as 'start'."
          - name: description
            type: string
            required: false
            description: 'Optional event body / agenda text.'
          - name: location
            type: string
            required: false
            description: "Optional location string (e.g. address or 'Zoom')."
          - name: to
            type: string
            required: false
            description: 'Optional recipient email address. If omitted, invite is sent to the configured demo Gmail account.'

      # FP-Stefan E1: read access to the manager-configured Google Calendar
      # without OAuth, using the per-calendar "Secret address in iCal format"
      # URL stored alongside the Gmail credential. The URL is itself a bearer
      # secret — the vault engine resolves it per-call and never returns the
      # value to the agent. Use whenever the user asks "what's my next
      # meeting / event", "what do I have today", "list my upcoming events",
      # etc. Do NOT use to create events — that's calendar_create_event.
      - name: calendar_list_upcoming
        label: 'Calendar List (Gmail)'
        description: "Read upcoming events from the configured Google Calendar via its secret iCal URL. Returns events sorted by start (summary, start, end, location). Recurring events show base DTSTART only. Use for 'next event' / 'this week'. Do NOT use to create — use calendar_create_event."
        implementation: vault_gmail_calendar_list
        required_credential_types: [gmail_app_password]
        timeout_seconds: 30
        parameters:
          - name: max_results
            type: integer
            required: false
            description: 'How many upcoming events to return (default 10, max 50). Lower this when the user only asks for the next one.'
          - name: within_days
            type: integer
            required: false
            description: 'Upper bound (in days) on how far ahead to look (default 30, max 365). Useful for "this week" (7) or "this month" (30) queries.'

  - name: storage
    commands:
      - name: vault_storage_read
        label: 'Vault Storage Read'
        description: 'Read a file or object from authenticated cloud storage via the Vault. Specify bucket and object key. Do NOT use for public URLs — use web_fetch instead. Do NOT include credential values in any parameter.'
        implementation: vault_storage_read
        required_credential_types: [storage_credential]
        timeout_seconds: 65
        parameters:
          - name: bucket
            type: string
            required: true
            description: 'Bucket or container name as configured in the Vault storage credential (e.g. "prod-assets", "reports-archive").'
          - name: key
            type: string
            required: true
            description: 'Object key or file path within the bucket (e.g. "reports/2024-01.csv", "images/logo.png").'

      - name: vault_storage_write
        label: 'Vault Storage Write'
        description: 'Write or overwrite an object in authenticated cloud storage via the Vault. Specify bucket, key, and content. Do NOT use for reading — use vault_storage_read. Do NOT include credential values in any parameter.'
        implementation: vault_storage_write
        required_credential_types: [storage_credential]
        timeout_seconds: 65
        parameters:
          - name: bucket
            type: string
            required: true
            description: 'Bucket or container name as configured in the Vault storage credential (e.g. "prod-assets", "reports-archive").'
          - name: key
            type: string
            required: true
            description: 'Object key or file path to write within the bucket (e.g. "reports/2024-01.csv"). Existing objects are overwritten.'
          - name: content
            type: string
            required: true
            description: 'Content to write to the object. For binary data, use base64 encoding and set content_type accordingly.'
          - name: content_type
            type: string
            required: false
            description: 'MIME type of the content (e.g. "text/plain", "application/json", "image/png"). Defaults to "application/octet-stream" when omitted.'

      - name: vault_storage_list
        label: 'Vault Storage List'
        description: 'List objects in an authenticated cloud storage bucket via the Vault. Returns object keys and metadata. Use an optional prefix to narrow results. Do NOT use to read object content — use vault_storage_read. Do NOT include credential values in any parameter.'
        implementation: vault_storage_list
        required_credential_types: [storage_credential]
        timeout_seconds: 35
        parameters:
          - name: bucket
            type: string
            required: true
            description: 'Bucket or container name as configured in the Vault storage credential (e.g. "prod-assets", "reports-archive").'
          - name: prefix
            type: string
            required: false
            description: 'Optional key prefix to filter results (e.g. "reports/2024-"). Omit to list all objects in the bucket.'
          - name: max_results
            type: integer
            required: false
            description: 'Maximum number of objects to return. Defaults to 100 when omitted; hard cap enforced by the Vault.'

  - name: logs
    commands:
      - name: logs_query
        label: 'Query System Event Logs'
        description: 'Filter system event logs by severity, service name, or time range. Returns structured log entries. Do NOT use for keyword search — use logs_search for that. Do NOT use to retrieve a specific agent execution history — use logs_agent for that.'
        implementation: logs_query
        required_credential_types: []
        timeout_seconds: 30
        parameters:
          - name: severity
            type: string
            required: false
            description: "Severity level to filter on: 'info', 'warn', or 'error'. Omit to return all severities."
            enum: [info, warn, error]
          - name: service_name
            type: string
            required: false
            description: "Name of the service that emitted the events (e.g. 'orchestrator', 'memory-api', 'vault'). Omit to query all services."
          - name: after
            type: string
            required: false
            description: "Return only events created after this ISO 8601 timestamp (e.g. '2026-04-22T10:00:00Z'). Omit for no lower bound."
          - name: before
            type: string
            required: false
            description: 'Return only events created before this ISO 8601 timestamp. Omit for no upper bound.'
          - name: limit
            type: integer
            required: false
            description: 'Maximum number of events to return. Defaults to 50; maximum is 200.'

      - name: logs_search
        label: 'Full-Text Search System Event Logs'
        description: 'Search log messages by keyword or phrase using full-text search. Returns ranked matching entries. Do NOT use for structured filtering by severity or time range — use logs_query for that. Do NOT use for agent execution history — use logs_agent for that.'
        implementation: logs_search
        required_credential_types: []
        timeout_seconds: 30
        parameters:
          - name: query
            type: string
            required: true
            description: 'Plain-text keyword or phrase to search for in log messages. Do not use SQL, regex, or tsquery syntax — plain English only.'
          - name: service_name
            type: string
            required: false
            description: 'Restrict the search to a specific service. Omit to search across all services.'
          - name: limit
            type: integer
            required: false
            description: 'Maximum number of matching events to return. Defaults to 20; maximum is 100.'

      - name: logs_tail
        label: 'Tail Recent Log Entries'
        description: 'Retrieve the most recent N log entries from a specific service. Useful for checking current service activity or health. Do NOT use for time-range analysis — use logs_query with after/before for that.'
        implementation: logs_tail
        required_credential_types: []
        timeout_seconds: 15
        parameters:
          - name: service_name
            type: string
            required: true
            description: "The service to retrieve recent logs for (e.g. 'orchestrator', 'memory-api', 'vault', 'agents')."
          - name: n
            type: integer
            required: false
            description: 'Number of most-recent entries to return. Defaults to 20; maximum is 100.'

      - name: logs_agent
        label: 'Retrieve Agent Execution History'
        description: 'Fetch the step-by-step execution log for an agent: tool calls, reasoning steps, and results in chronological order. Do NOT use for system-level service events — use logs_query or logs_search for those.'
        implementation: logs_agent
        required_credential_types: []
        timeout_seconds: 30
        parameters:
          - name: agent_id
            type: string
            required: true
            description: 'UUID of the agent whose execution history to retrieve.'
          - name: task_id
            type: string
            required: false
            description: "Restrict results to a specific task ID. Omit to return the agent's full history across all tasks."
          - name: limit
            type: integer
            required: false
            description: 'Maximum number of execution log entries to return. Defaults to 50; maximum is 200.'

  - name: google_search
    commands:
      - name: vault_google_search
        label: 'Vault Google Search'
        description: 'Search the web using Google Custom Search API via the Vault. Returns titles, URLs, and snippets for the top results. Use for current information, research, and fact-finding. Do NOT use for private or internal data — use vault_data_read for that. Do NOT include credential values in any parameter.'
        implementation: vault_google_search
        required_credential_types: [serper_api_key]
        timeout_seconds: 40
        parameters:
          - name: query
            type: string
            required: true
            description: 'The search query string. Be specific and concise. Avoid overly broad queries — narrow scope produces better results.'
          - name: num_results
            type: integer
            required: false
            description: 'Number of results to return. Defaults to 5 when omitted; maximum 10.'

  - name: github
    commands:
      - name: vault_github_request
        label: 'Vault GitHub Request'
        description: 'Make an authenticated request to the GitHub REST API via the Vault. Use for reading repos, issues, pull requests, code, and user data. Do NOT use for public unauthenticated GitHub data — use web_fetch instead. Do NOT include credential values in any parameter.'
        implementation: vault_github_request
        required_credential_types: [github_token]
        timeout_seconds: 35
        parameters:
          - name: path
            type: string
            required: true
            description: 'GitHub API path (e.g. "/repos/owner/repo/issues", "/user/repos"). Must start with "/".'
          - name: method
            type: string
            required: false
            description: 'HTTP method. Allowed: GET, POST, PATCH, DELETE. Defaults to GET when omitted.'
            enum: [GET, POST, PATCH, DELETE]
          - name: body
            type: string
            required: false
            description: 'Request body as a JSON-encoded string. Only used for POST and PATCH. Omit for GET and DELETE.'

  - name: local_files
    commands:
      - name: local_file_write
        label: 'Local File Write'
        description: "Write text to a file in the user's local data directory (e.g. ~/notes.txt). Use mode='append' or 'overwrite'. Do NOT use for binary data. Do NOT use to write outside the user's data directory — paths are sandboxed."
        implementation: local_file_write
        required_credential_types: []
        timeout_seconds: 15
        parameters:
          - name: path
            type: string
            required: true
            description: "Relative path within the user's data directory (e.g. 'notes.txt'). The prefix '~/' is treated as the user's home dir. Absolute paths outside the sandbox are rejected."
          - name: content
            type: string
            required: true
            description: 'Text content to write. Will be UTF-8 encoded.'
          - name: mode
            type: string
            required: false
            description: "Write mode: 'append' (default — adds to file end with newline if absent) or 'overwrite' (replaces file contents)."
            enum: [append, overwrite]

      - name: local_file_read
        label: 'Local File Read'
        description: "Read text from a file in the user's local data directory. Returns up to 256KB; longer files are truncated. Do NOT use for binary data. Do NOT use to read outside the user's data directory — paths are sandboxed."
        implementation: local_file_read
        required_credential_types: []
        timeout_seconds: 10
        parameters:
          - name: path
            type: string
            required: true
            description: "Relative path within the user's data directory. The prefix '~/' is treated as the user's home dir."

  - name: general
    commands: []
