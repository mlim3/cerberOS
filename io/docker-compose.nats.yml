# Optional: bundled NATS + published ports (4222/8222 on the host).
# Use with docker-compose.yml when you are NOT using aegis-databus NATS on the host.
#
#   docker compose -f docker-compose.yml -f docker-compose.nats.yml up -d --build
#
# For DataBus on the host (port 4222), use docker-compose.databus.yml instead of this file.

services:
  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - cerberos

  io:
    depends_on:
      - nats
