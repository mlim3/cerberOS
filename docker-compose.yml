# =============================================================================
# cerberOS — Root Docker Compose
# =============================================================================
#
# Start the full stack:   docker compose up --build
# Start core only:        docker compose up --build nats orchestrator io
# Start with agents:      docker compose --profile agents up --build
#
# Port map (host → container):
#   3001 → io API/UI
#   4222 → NATS client
#   8000 → vault engine API
#   8080 → orchestrator health
#   8081 → memory API
#   8082 → vault swagger UI
#   8200 → OpenBao
#   8222 → NATS monitoring
#   9090 → agents metrics       (profile: agents)
#
# =============================================================================

# ---------------------------------------------------------------------------
# 1. MESSAGING
# ---------------------------------------------------------------------------
services:
  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cerberos

  # ---------------------------------------------------------------------------
  # 2. CONTROL PLANE
  # ---------------------------------------------------------------------------
  orchestrator:
    build:
      context: ./orchestrator
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
      NATS_CREDS_PATH: ""
      VAULT_ADDR: http://openbao:8200
      MEMORY_ENDPOINT: http://memory-api:8081
      IO_API_BASE: http://io:3001
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - cerberos

  # ---------------------------------------------------------------------------
  # 3. USER / IO
  # ---------------------------------------------------------------------------
  io:
    build:
      context: ./io
      args:
        ENABLE_VOICE: "false"
    ports:
      - "3001:3001"
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DEMO_MODE: "false"
      NATS_URL: nats://nats:4222
      LOG_LEVEL: debug
      STT_PROVIDER: disabled
      MEMORY_API_BASE: http://memory-api:8081
    restart: unless-stopped
    networks:
      - cerberos

  # ---------------------------------------------------------------------------
  # 4. MEMORY
  # ---------------------------------------------------------------------------
  memory-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-memory_db}
    ports:
      - "5432:5432"
    volumes:
      - ./memory/scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
      - ./scripts/init-openbao-db.sql:/docker-entrypoint-initdb.d/02-init-openbao-db.sql:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-memory_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      cerberos:
        # Alias "db" so vault/openbao.hcl connection_url (postgres://...@db:5432/...)
        # resolves without a custom HCL override.
        aliases:
          - db

  memory-api:
    build:
      context: ./memory
    depends_on:
      memory-db:
        condition: service_healthy
    environment:
      DB_HOST: memory-db
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-password}
      DB_NAME: ${POSTGRES_DB:-memory_db}
      PORT: "8081"
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY:?Set VAULT_MASTER_KEY in .env (32-byte hex)}
      INTERNAL_VAULT_API_KEY: ${INTERNAL_VAULT_API_KEY:?Set INTERNAL_VAULT_API_KEY in .env}
    ports:
      - "8081:8081"
    restart: unless-stopped
    networks:
      - cerberos

  # ---------------------------------------------------------------------------
  # 5. CREDENTIAL VAULT
  # ---------------------------------------------------------------------------
  openbao:
    image: openbao/openbao:latest
    command: server -config=/openbao/local/openbao.hcl
    ports:
      - "8200:8200"
    environment:
      BAO_ADDR: http://127.0.0.1:8200
    volumes:
      - ./vault/openbao.hcl:/openbao/local/openbao.hcl:ro
    cap_add:
      - IPC_LOCK
    depends_on:
      memory-db:
        condition: service_healthy
    restart: "no"
    networks:
      - cerberos

  vault:
    build:
      context: ./vault/engine
    ports:
      - "8000:8000"
    environment:
      BAO_ADDR: http://openbao:8200
      BAO_TOKEN: ${BAO_TOKEN:-}
    depends_on:
      - openbao
    restart: "no"
    networks:
      - cerberos

  swagger:
    image: swaggerapi/swagger-ui
    ports:
      - "8082:8080"
    environment:
      SWAGGER_JSON: /spec/openapi.yaml
    volumes:
      - ./vault/openapi.yaml:/spec/openapi.yaml:ro
    restart: "no"
    networks:
      - cerberos

  # ---------------------------------------------------------------------------
  # 6. AGENTS (optional — docker compose --profile agents up)
  # ---------------------------------------------------------------------------
  simulator:
    build:
      context: ./agents-component
    entrypoint: ["/app/simulator"]
    profiles:
      - agents
    depends_on:
      nats:
        condition: service_healthy
    environment:
      AEGIS_NATS_URL: nats://nats:4222
    restart: unless-stopped
    networks:
      - cerberos

  aegis-agents:
    build:
      context: ./agents-component
    profiles:
      - agents
    depends_on:
      nats:
        condition: service_healthy
      simulator:
        condition: service_started
    environment:
      AEGIS_NATS_URL: nats://nats:4222
      AEGIS_AGENT_PROCESS_PATH: /app/agent-process
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - cerberos

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  cerberos:
    name: cerberos

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  nats-data:
  postgres-data:
  # Reserved for future mTLS (see CA_PLAN.md):
  # certs:
