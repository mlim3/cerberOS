services:
  engine:
    build:
      dockerfile: "Dockerfile.qemu"
      context: "./engine"
    ports:
      - "8000:8000"
    environment:
      - SECRET_STORE_TOKEN=value
      - SECRET_STORE_URL=http://secretstore:8001
    privileged: true
    depends_on: 
      - secretstore
    restart: no
  
  secretstore:
    build:
      context: "./secretstore"
    ports:
      - "8001:8001"
    environment:
      - ENGINE_TOKEN=value
    restart: no

  ui:
    build:
      context: "./internal-ui"
    ports:
      - "80:80"
    depends_on:
      - secretstore
      - engine
    restart: no

  swagger:
    image: swaggerapi/swagger-ui
    ports:
      - "8080:8080"
    environment:
      - SWAGGER_JSON=/spec/openapi.yaml
    volumes:
      - ./openapi.yaml:/spec/openapi.yaml:ro
    restart: no
