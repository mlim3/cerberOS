openapi: 3.1.0
info:
  title: cerberOS Vault API
  version: 2.0.0
  description: |
    Vault is a credential broker for cerberOS agents. Agents submit scripts
    with `{{PLACEHOLDER}}` markers; Vault resolves the secrets, injects them
    into the script, and returns the completed script for the agent to execute
    in its own environment.

    Authorization is atomic — if any requested secret is denied or missing,
    the entire request fails with no partial injection.

servers:
  - url: http://localhost:8000
    description: Vault (local)

tags:
  - name: Vault
    description: Secret injection endpoints

paths:
  /inject:
    post:
      tags: [Vault]
      summary: Inject secrets into a script
      description: |
        Resolves all `{{PLACEHOLDER}}` tokens in the provided script and returns
        the completed script with secret values substituted. If any placeholder
        references a secret that is not found or not authorized, the entire
        request fails — no partial injection occurs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InjectRequest'
            example:
              agent: my-agent
              script: "#!/bin/sh\necho {{API_KEY}}"
      responses:
        '200':
          description: Script with secrets injected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InjectResponse'
              example:
                agent: my-agent
                script: "#!/bin/sh\necho actual-api-key-value"
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: One or more secrets not found or access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "secret not found: NONEXISTENT"
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

components:
  schemas:
    InjectRequest:
      type: object
      required: [script]
      properties:
        agent:
          type: string
          description: Identifier for the calling agent (used in audit logs)
          example: my-agent
        script:
          type: string
          description: |
            Shell script with optional `{{KEY}}` placeholders that will be
            replaced with resolved secret values.
          example: "#!/bin/sh\necho {{API_KEY}}"
        keys:
          type: array
          items:
            type: string
          description: Secret keys the agent is requesting (for audit logging)
          example: ["API_KEY"]

    InjectResponse:
      type: object
      properties:
        agent:
          type: string
          description: Echo of the agent identifier from the request
        script:
          type: string
          description: The script with all placeholders replaced by secret values

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message

  responses:
    BadRequest:
      description: Malformed or missing request body
      content:
        text/plain:
          example: invalid request body
    MethodNotAllowed:
      description: Wrong HTTP method used
      content:
        text/plain:
          example: method not allowed
