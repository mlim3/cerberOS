openapi: 3.1.0
info:
  title: cerberOS Vault API
  version: 2.1.0
  description: |
    Vault is a credential broker for cerberOS agents. Agents submit scripts
    with `{{PLACEHOLDER}}` markers; Vault resolves the secrets, injects them
    into the script, and returns the completed script for the agent to execute
    in its own environment.

    Authorization is atomic — if any requested secret is denied or missing,
    the entire request fails with no partial injection.

servers:
  - url: http://localhost:8000
    description: Vault (local)

tags:
  - name: Vault
    description: Secret injection and CRUD endpoints
  - name: System
    description: Operational endpoints

paths:
  /healthz:
    get:
      tags: [System]
      summary: Liveness check
      description: |
        Returns a minimal JSON payload when the service is up. Used by load
        balancers and orchestrators.
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthzResponse'
              example:
                status: ok

  /inject:
    post:
      tags: [Vault]
      summary: Inject secrets into a script
      description: |
        Resolves all `{{PLACEHOLDER}}` tokens in the provided script and returns
        the completed script with secret values substituted. If any placeholder
        references a secret that is not found or not authorized, the entire
        request fails — no partial injection occurs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InjectRequest'
            example:
              agent: my-agent
              script: "#!/bin/sh\necho {{API_KEY}}"
      responses:
        '200':
          description: Script with secrets injected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InjectResponse'
              example:
                agent: my-agent
                script: "#!/bin/sh\necho actual-api-key-value"
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: One or more secrets not found or access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "secret not found: NONEXISTENT"
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /secrets/get:
    post:
      tags: [Vault]
      summary: Read secrets by key
      description: |
        Returns values for all requested secret keys in one response. If any key
        is missing or access is denied, the entire request fails — no partial results.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecretGetRequest'
            example:
              agent_id: my-agent
              keys: [API_KEY, DB_PASS]
      responses:
        '200':
          description: Map of secret keys to values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretGetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: One or more secrets not found or access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /secrets/put:
    post:
      tags: [Vault]
      summary: Write or update a secret
      description: Stores a secret value under the given key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecretPutRequest'
            example:
              key: MY_SECRET
              value: super-secret
      responses:
        '204':
          description: Secret stored successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Write denied or backend error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /secrets/delete:
    post:
      tags: [Vault]
      summary: Delete a secret
      description: Removes the secret for the given key. Uses POST for consistency with other vault actions (no body on DELETE).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecretDeleteRequest'
            example:
              key: MY_SECRET
      responses:
        '204':
          description: Secret deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Delete denied or backend error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

components:
  schemas:
    InjectRequest:
      type: object
      required: [script]
      properties:
        agent:
          type: string
          description: Identifier for the calling agent (used in audit logs)
          example: my-agent
        script:
          type: string
          description: |
            Shell script with optional `{{KEY}}` placeholders that will be
            replaced with resolved secret values.
          example: "#!/bin/sh\necho {{API_KEY}}"
        keys:
          type: array
          items:
            type: string
          description: Secret keys the agent is requesting (for audit logging)
          example: ["API_KEY"]

    InjectResponse:
      type: object
      properties:
        agent:
          type: string
          description: Echo of the agent identifier from the request
        script:
          type: string
          description: The script with all placeholders replaced by secret values

    SecretGetRequest:
      type: object
      properties:
        keys:
          type: array
          items:
            type: string
          description: Secret keys to resolve
      required: [keys]

    SecretGetResponse:
      type: object
      properties:
        secrets:
          type: object
          additionalProperties:
            type: string
          description: Map of secret key to value
      required: [secrets]

    SecretPutRequest:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
          description: Secret key
        value:
          type: string
          description: Secret value to store

    SecretDeleteRequest:
      type: object
      required: [key]
      properties:
        key:
          type: string
          description: Secret key to remove

    HealthzResponse:
      type: object
      properties:
        status:
          type: string
          description: Human-readable health status
          example: ok
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message

  responses:
    BadRequest:
      description: Malformed or missing request body
      content:
        text/plain:
          example: invalid request body
    MethodNotAllowed:
      description: Wrong HTTP method used
      content:
        text/plain:
          example: method not allowed
