port: 4222
http_port: 8222
server_name: nats-3

tls {
  cert_file: "/config/certs/server.pem"
  key_file:  "/config/certs/server-key.pem"
  ca_file:   "/config/certs/ca.pem"
  verify:    false
  min_version: "1.3"
}

jetstream {
  store_dir: /data
}

cluster {
  name: aegis-cluster
  port: 6222
  routes [
    nats://nats-1:6222
    nats://nats-2:6222
  ]
}
