services:

  orchestrator:
    build: .
    environment:
      # Required — override with real values in production
      NATS_URL: nats://nats:4222
      NATS_CREDS_PATH: ""

      # Optional — IO Component integration (uncomment to enable UI)
      # IO_API_BASE: http://io:3001

      # Optional — defaults shown; uncomment to override
      # NODE_ID: orchestrator-1
      # VAULT_ADDR: http://vault:8200
      # MEMORY_ENDPOINT: http://memory:8080
      # VAULT_FAILURE_MODE: FAIL_CLOSED
      # MAX_TASK_RETRIES: 3
      # DECOMPOSITION_TIMEOUT_SECONDS: 30
      # MAX_SUBTASKS_PER_PLAN: 20
      # PLAN_EXECUTOR_MAX_PARALLEL: 5
    ports:
      - "8080:8080"   # health endpoint
    restart: unless-stopped
    networks:
      - cerberos

  # Shared NATS JetStream broker.
  # Skip this service (--no-deps) if using the broker from agents-component.
  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cerberos

volumes:
  nats-data:

networks:
  cerberos:
    external: true
