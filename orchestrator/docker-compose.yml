services:

  orchestrator:
    build: .
    depends_on:
      - nats
      - tempo
    environment:
      # Required — override with real values in production
      NATS_URL: nats://nats:4222
      NATS_CREDS_PATH: ""

      # Optional — IO Component integration (uncomment to enable UI)
      # IO_API_BASE: http://io:3001

      # Optional — defaults shown; uncomment to override
      # NODE_ID: orchestrator-1
      # VAULT_ADDR: http://vault:8200
      # MEMORY_ENDPOINT: http://memory:8080
      # VAULT_FAILURE_MODE: FAIL_CLOSED
      # MAX_TASK_RETRIES: 3
      # DECOMPOSITION_TIMEOUT_SECONDS: 30
      # MAX_SUBTASKS_PER_PLAN: 20
      # PLAN_EXECUTOR_MAX_PARALLEL: 5

      # Observability (Step 9 env vars)
      LOG_LEVEL: info
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: tempo:4317
      LOKI_URL: http://loki:3100
    ports:
      - "8080:8080"   # health + debug endpoints
    restart: unless-stopped
    networks:
      - cerberos

  # Shared NATS JetStream broker.
  # Skip this service (--no-deps) if using the broker from agents-component.
  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cerberos

  loki:
    image: grafana/loki:2.9.0
    container_name: aegis-loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - cerberos

  promtail:
    image: grafana/promtail:2.9.0
    container_name: aegis-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./observability/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - cerberos

  tempo:
    image: grafana/tempo:2.3.0
    container_name: aegis-tempo
    ports:
      - "4317:4317"   # OTLP gRPC
      - "3200:3200"   # Tempo HTTP
    volumes:
      - ./observability/tempo-config.yml:/etc/tempo.yml
      - tempo-data:/tmp/tempo
    command: -config.file=/etc/tempo.yml
    networks:
      - cerberos

  grafana:
    image: grafana/grafana:10.2.0
    container_name: aegis-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - ./observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
      - tempo
    networks:
      - cerberos

volumes:
  nats-data:
  loki-data:
  tempo-data:
  grafana-data:

networks:
  cerberos:
    external: true
