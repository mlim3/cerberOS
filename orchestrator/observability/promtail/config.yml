# Promtail: ship Docker container logs → Loki.
# Expects compose-managed containers (label com.docker.compose.service).
# App JSON fields are parsed into Loki labels where cardinality is bounded.
# task_id / trace_id stay in the log line for LogQL `| json` queries and Tempo links.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    external_labels:
      cluster: cerberos

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: status
            values: [running]
    relabel_configs:
      # Set job unconditionally — guarantees at least one label reaches Loki.
      # Uses container_id as source so replacement is always applied.
      - source_labels: ['__meta_docker_container_id']
        replacement: docker
        target_label: job
      # Only Docker Compose services (skip random docker run containers)
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        regex: ^$
        action: drop
      # Do not ingest observability stack (feedback loop / noise)
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        regex: (loki|grafana|promtail)
        action: drop
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        regex: (.+)
        target_label: compose_service
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        regex: (.+)
        target_label: compose_project
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container_name

    # Unwrap Docker json-file log lines ({"log":"...","stream":"stdout",...}) into plain text for Loki,
    # then parse the standardized cerberOS JSON log schema (see docs/logging.md).
    #
    # `component` is one of the six top-level components (agents, orchestrator,
    # io, memory, vault, databus). `module` is the sub-unit within a component
    # (server, dispatcher, http, ...). Both are bounded enough to be Loki labels.
    # task_id / trace_id stay in the log body for LogQL `| json` queries and
    # Tempo links.
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            component: component
            module: module
            level: level
            msg: msg
            task_id: task_id
            trace_id: trace_id
            request_id: request_id
            message_id: message_id
      - labels:
          component:
          module:
          level:
