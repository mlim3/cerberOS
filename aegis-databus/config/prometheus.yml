global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "nats-exporter"
    static_configs:
      - targets:
          - "nats-exporter:7777"
  # DataBus metrics (when running on host: host.docker.internal; or add databus to docker-compose)
  - job_name: "aegis-databus"
    static_configs:
      - targets:
          - "host.docker.internal:9091"
          - "aegis-databus:9091"
  # Orchestrator exposes /metrics on its health HTTP port (8080) — see
  # orchestrator/internal/api/metrics.go for the counter surface.
  - job_name: "orchestrator"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "orchestrator:8080"
  # Memory API exposes /internal/metrics (prometheus/client_golang).
  - job_name: "memory-api"
    metrics_path: /internal/metrics
    static_configs:
      - targets:
          - "memory-api:8081"
  # Agents component exposes /metrics on its metrics port (9090 inside container, 9190 on host).
  - job_name: "aegis-agents"
    static_configs:
      - targets:
          - "aegis-agents:9090"
