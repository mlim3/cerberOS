apiVersion: 1
providers:
  - name: aegis
    orgId: 1
    folder: Aegis
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards/json
  - name: cerberos
    orgId: 1
    folder: cerberOS
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/dashboards
