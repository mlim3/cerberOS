# TLS 1.3 overlay (NFR-DB-006). Run: make generate-tls-certs && docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d
# Clients: AEGIS_NATS_URL=tls://127.0.0.1:4222 AEGIS_NATS_TLS_CA=config/certs/ca.pem

services:
  nats-1:
    command: ["-c", "/config/tls/nats-node1.conf"]
    volumes:
      - ./config/tls/nats-node1.conf:/config/tls/nats-node1.conf
      - ./config/certs:/config/certs:ro
  nats-2:
    command: ["-c", "/config/tls/nats-node2.conf"]
    volumes:
      - ./config/tls/nats-node2.conf:/config/tls/nats-node2.conf
      - ./config/certs:/config/certs:ro
  nats-3:
    command: ["-c", "/config/tls/nats-node3.conf"]
    volumes:
      - ./config/tls/nats-node3.conf:/config/tls/nats-node3.conf
      - ./config/certs:/config/certs:ro
